<head>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Hind Siliguri', Arial, sans-serif;
    padding: 24px 16px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* আধুনিক ডার্ক ওভারলে গ্রেডিয়েন্ট */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, rgba(10, 10, 15, 0.85), rgba(20, 10, 25, 0.9));
    z-index: -1;
}

.container {
    width: 100%;
    max-width: 600px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* প্রিমিয়াম কন্টেইনার কার্ড ডিজাইন */
.card {
    text-decoration: none;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    display: flex;
    overflow: hidden;
    position: relative;
    min-height: 150px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

/* হোভার ইফেক্ট */
.card:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 20, 147, 0.6);
    box-shadow: 0 15px 35px rgba(255, 20, 147, 0.25);
}

/* ইমেজ সেকশন (Left) */
.left {
    width: 45%;
    position: relative;
    overflow: hidden;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
}

.card:hover .left img {
    transform: scale(1.08);
}

/* ওটিটি প্লে বাটন ওভারলে */
.left::after {
    content: "\f144";
    font-family: "Font Awesome 6 Free";
    font-weight: 900;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff1493;
    font-size: 36px;
    opacity: 0.85;
    text-shadow: 0 0 15px rgba(255, 20, 147, 0.8);
    transition: all 0.3s ease;
}

.card:hover .left::after {
    color: #fff;
    opacity: 1;
    font-size: 42px;
}

/* টেক্সট সেকশন (Right) */
.right {
    padding: 16px 20px;
    width: 55%;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.title {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.4;
    color: #ffffff;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.subtitle {
    font-size: 13px;
    line-height: 1.4;
    color: #b3b3b3;
    font-weight: 400;
}

/* টাইমস্ট্যাম্প ডিজাইন */
.site {
    color: #ff1493;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
}

/* প্রিমিয়াম গ্রেডিয়েন্ট ট্র্যাকিং বাটন বা অ্যারো */
.arrow {
    position: absolute;
    right: 16px;
    bottom: 16px;
    background: linear-gradient(135deg, #ff1493, #ff4500);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(255, 20, 147, 0.4);
    transition: all 0.3s ease;
}

.card:hover .arrow {
    transform: scale(1.1) rotate(-45deg);
    background: #fff;
    color: #ff1493;
}

/* টিক্যার বা নোটিশ বোর্ড */
.ticker {
    width: 100%;
    max-width: 600px;
    margin-top: 24px;
    background: linear-gradient(90deg, rgba(255, 20, 147, 0.9), rgba(255, 69, 0, 0.9));
    overflow: hidden;
    padding: 14px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(255, 20, 147, 0.4);
}

.tickerText {
    white-space: nowrap;
    color: white;
    font-size: 15px;
    font-weight: 700;
    display: inline-block;
    animation: move 25s linear infinite;
}

@keyframes move {
    from { transform: translateX(50%); }
    to { transform: translateX(-100%); }
}

/* রেস্পন্সিভনেস */
@media(max-width: 480px) {
    .card {
        min-height: 130px;
    }
    .right {
        padding: 12px 14px;
    }
    .title {
        font-size: 15px;
    }
    .subtitle {
        font-size: 12px;
    }
    .site {
        font-size: 11px;
    }
    .left::after {
        font-size: 28px;
    }
    .arrow {
        width: 28px;
        height: 28px;
        font-size: 12px;
        right: 12px;
        bottom: 12px;
    }
}
</style>
</head>
<body>

function getTwoRandom(){
let first=Math.floor(Math.random()*cards.length);

do{

}while(second===first);

}
