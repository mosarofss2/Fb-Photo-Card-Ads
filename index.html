<meta property="og:description" content="নতুন নতুন ভাইরাল ভিডিও দেখতে ক্লিক করুন">

*{margin:0;padding:0;box-sizing:border-box}
body{
min-height:100vh;
overflow-x:hidden;
background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
font-family:Arial,sans-serif;
padding:20px;
position:relative;
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:-1;
}
.container{
max-width:700px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}
.card{
text-decoration:none;
background:rgba(255,255,255,.16);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.18);
border-radius:25px;
display:flex;
overflow:hidden;
position:relative;
min-height:170px;
box-shadow:0 0 18px rgba(255,255,255,.18);
transition:.25s;
}
.card:hover{transform:scale(1.02)}
.left{width:52%}
.left img{width:100%;height:100%;object-fit:cover;display:block}
.right{padding:18px;width:48%;color:#fff;display:flex;flex-direction:column;justify-content:center}
.title{font-size:18px;font-weight:bold;margin-bottom:6px;color:#fff;text-shadow:0 0 8px rgba(255,255,255,.7)}
.subtitle{font-size:14px;line-height:1.5;margin-bottom:10px;color:#f8f8f8}
.site{color:#eee;font-size:10px;margin-top:auto;padding-top:12px;opacity:.9}
.arrow{position:absolute;right:18px;bottom:18px;color:white;font-size:34px;font-weight:bold}
@media(max-width:650px){.card{min-height:140px}.title{font-size:16px}.subtitle{font-size:13px}}
</style></head>

function getTwoRandom(){
let first=Math.floor(Math.random()*cards.length);
let second;
do{
second=Math.floor(Math.random()*cards.length)
}while(second===first);
return [cards[first],cards[second]];
}

const selected=getTwoRandom();
const box=document.getElementById('cardsContainer');
selected.forEach(c=>{
const randomMinute=Math.floor(Math.random()*119)+2;
const timeText=randomMinute>=60
?`${Math.floor(randomMinute/60)} ঘণ্টা আগে`
:`${randomMinute} মিনিট আগে`;

box.innerHTML+=`
<a class="card" href="${c.link}">
<div class="left"><img src="${c.img}"></div>
<div class="right">
<div class="title">${c.title}</div>
<div class="subtitle">${c.desc}</div>
<div class="site">🕒 ${timeText}</div>
</div>
<div class="arrow">→</div>
</a>`
})
