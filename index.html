<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Card Landing</title>

<meta property="og:title" content="সকল প্রকার ভাইরাল ভিডিও সমাহার 🥵">
<meta property="og:description" content="নতুন নতুন ভাইরাল ভিডিও দেখতে ক্লিক করুন">
<meta property="og:image" content="https://mosarofss2.github.io/facebook.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* কোনো স্ক্রোল হবে না */
}

body {
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Hind Siliguri', Arial, sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* উপর থেকে নিচ পর্যন্ত স্পেস ম্যানেজমেন্ট */
    align-items: center;
    padding: 15px 12px;
}

/* স্ক্রিনশটের মতো নিখুঁত ডার্ক ব্যাকগ্রাউন্ড ব্লেন্ড */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(28,22,33,0.85) 0%, rgba(13,10,18,0.95) 100%);
    z-index: 1;
}

/* মেইন কন্টেইনার সব ডিভাইসে ফিট রাখার জন্য */
.wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    height: calc(100% - 60px); /* নো-স্ক্রোলের জন্য টিক্যারের জায়গা রেখে হাইট ফিক্স */
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
}

.container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* প্রিমিয়াম ওটিটি গ্লাস কার্ড ডিজাইন */
.card {
    text-decoration: none;
    background: #1c1524;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 24px;
    display: flex;
    overflow: hidden;
    position: relative;
    height: calc((100vh - 120px) / 4.5); /* ডাইনামিক রেসপন্সিভ হাইট */
    min-height: 115px;
    max-height: 145px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    transition: transform 0.2s ease, border-color 0.2s ease;
}

.card:active, .card:hover {
    transform: scale(0.99);
    border-color: rgba(255, 20, 147, 0.4);
}

/* ইমেজ সেকশন (Left) */
.left {
    width: 45%;
    position: relative;
    overflow: hidden;
    background: #000;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.85;
}

/* স্ক্রিনশটের মতো সঠিক গোল প্লে বাটন */
.play-btn {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 38px;
    height: 38px;
    background: #ff1493;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    padding-left: 2px;
    box-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
    z-index: 2;
}

/* টেক্সট সেকশন (Right) */
.right {
    padding: 12px 14px 12px 14px;
    width: 55%;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
}

.title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.35;
    color: #ffffff;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.subtitle {
    font-size: 12px;
    color: #9c9aa2;
    font-weight: 400;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* টাইমস্ট্যাম্প সেকশন */
.site {
    color: #ff1493;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: auto;
}

/* স্ক্রিনশটের মতো পিঙ্ক টু অরেঞ্জ গ্রেডিয়েন্ট অ্যারো বাটন */
.arrow {
    position: absolute;
    right: 12px;
    bottom: 12px;
    background: linear-gradient(135deg, #ff1493, #ff4500);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 11px;
    box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
}

/* বটম টিক্যার নোটিশ */
.ticker {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    background: linear-gradient(90deg, #ff1493, #ff4500);
    overflow: hidden;
    padding: 10px;
    border-radius: 14px;
    box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
    margin-top: auto;
}

.tickerText {
    white-space: nowrap;
    color: white;
    font-size: 13px;
    font-weight: 700;
    display: inline-block;
    animation: move 20s linear infinite;
}

@keyframes move {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* ছোট ডিভাইসের জন্য অতিরিক্ত অপ্টিমাইজেশন */
@media(max-width: 360px) {
    .title { font-size: 13px; }
    .subtitle { font-size: 11px; }
    .card { min-height: 105px; }
    .play-btn { width: 32px; height: 32px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="container" id="cardsContainer"></div>
</div>

<div class="ticker">
    <div class="tickerText">🔥 আজকের ভাইরাল ভিডিও • নতুন ট্রেন্ডিং ভিডিও • লাইভ আপডেট • আরও দেখতে ক্লিক করুন • আপনার পছন্দের ভিডিওর উপর ক্লিক করে দেখে নিন এখনই 🥵 </div>
</div>

<script>

{img:'photo4.jpg',title:'নিজের মাকে দেখে চু*দে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 4',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo5.jpg',title:'হাত জোর করেও রক্ষা পেলনা মেয়েটি',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 5',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},

{img:'photo11.jpg',title:'বৌদির কি বড় পাছা, না দেখলে মিস',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 11',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo12.jpg',title:'মেয়েটাকে বাগানে একা পেয়ে ধ*র্ষ*ণ করে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন... ',site:'Update 12',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'}
];

function getTwoRandom(){
let first=Math.floor(Math.random()*cards.length);
let second;
do{
second=Math.floor(Math.random()*cards.length)
}while(second===first);
return [cards[first],cards[second]];
}

const selected=getTwoRandom();
const box=document.getElementById('cardsContainer');
selected.forEach(c=>{
const randomMinute=Math.floor(Math.random()*119)+2;
const timeText=randomMinute>=60
?`${Math.floor(randomMinute/60)} ঘণ্টা আগে`
:`${randomMinute} মিনিট আগে`;

box.innerHTML+=`
<a class="card" href="${c.link}">
<div class="left">
    <img src="${c.img}">
    <div class="play-btn"><i class="fa-solid fa-play"></i></div>
</div>
<div class="right">
    <div class="title">${c.title}</div>
    <div class="subtitle">${c.desc}</div>
    <div class="site"><i class="fa-solid fa-circle-radiation" style="font-size:10px;"></i> ${timeText}</div>
    <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>

</a>`
})
</script>

</body>
</html>
