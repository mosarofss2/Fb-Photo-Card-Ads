<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Card Landing</title>

<meta property="og:title" content="সকল প্রকার ভাইরাল ভিডিও সমাহার 🥵">
<meta property="og:description" content="নতুন নতুন ভাইরাল ভিডিও দেখতে ক্লিক করুন">
<meta property="og:image" content="facebook.jpg">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    background-color: #0d0a12;
}

body {
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Hind Siliguri', Arial, sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 16px 14px;
}

/* ব্যাকগ্রাউন্ড ইমেজটি সুন্দরভাবে ফুটিয়ে তোলার জন্য হালকা ডার্ক ওভারলে ও ব্লার */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(20, 15, 25, 0.65) 0%, rgba(13, 10, 18, 0.85) 100%);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    z-index: 1;
}

/* মেইন কন্টেইনার */
.wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    height: calc(100% - 65px);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

/* ওটিটি গ্লাস কার্ড ডিজাইন */
.card {
    text-decoration: none;
    background: rgba(28, 21, 36, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 24px;
    display: flex;
    overflow: hidden;
    position: relative;
    height: calc((100vh - 130px) / 4.2);
    min-height: 115px;
    max-height: 145px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
    transition: transform 0.2s ease, border-color 0.2s ease;
}

.card:active {
    transform: scale(0.98);
}

/* ইমেজ সেকশন (Left) */
.left {
    width: 45%;
    position: relative;
    overflow: hidden;
    background: #000;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.9;
}

/* গোল প্লে বাটন এবং অ্যানিমেশন */
.play-btn {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 38px;
    height: 38px;
    background: #ff1493;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    padding-left: 2px;
    box-shadow: 0 0 15px rgba(255, 20, 147, 0.6);
    z-index: 2;
    animation: pulse 1.8s infinite;
}

@keyframes pulse {
    0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 20, 147, 0.7);
    }
    70% {
        transform: scale(1.08);
        box-shadow: 0 0 0 10px rgba(255, 20, 147, 0);
    }
    100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 20, 147, 0);
    }
}

/* ট্রেন্ডিং ব্যাজ */
.trending-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(255, 20, 147, 0.9);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* টেক্সট সেকশন (Right) */
.right {
    padding: 14px 14px;
    width: 55%;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
}

.title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: #ffffff;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.subtitle {
    font-size: 12px;
    color: #9c9aa2;
    font-weight: 400;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* লাইভ কাউন্টার এবং মেটা সেকশন */
.meta-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: auto;
}

.live-counter {
    font-size: 11px;
    color: #00ffcc;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
}

.site {
    color: #ff1493;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
}

/* পিঙ্ক টু অরেঞ্জ গ্রেডিয়েন্ট অ্যারো বাটন */
.arrow {
    position: absolute;
    right: 14px;
    bottom: 14px;
    background: linear-gradient(135deg, #ff1493, #ff4500);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 11px;
    box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
}

/* বটম টিক্যার নোটিশ */
.ticker {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    background: linear-gradient(90deg, #ff1493, #ff4500);
    overflow: hidden;
    padding: 12px;
    border-radius: 16px;
    box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
    margin-top: auto;
}

.tickerText {
    white-space: nowrap;
    color: white;
    font-size: 14px;
    font-weight: 700;
    display: inline-block;
    animation: move 20s linear infinite;
}

@keyframes move {
    from { transform: translateX(30%); }
    to { transform: translateX(-100%); }
}

/* লোডিং কঙ্কাল (Skeleton Effect) */
.skeleton-card {
    background: rgba(28, 21, 36, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 24px;
    display: flex;
    height: calc((100vh - 130px) / 4.2);
    min-height: 115px;
    max-height: 145px;
    overflow: hidden;
}

.skeleton-left {
    width: 45%;
    background: rgba(255, 255, 255, 0.03);
    position: relative;
}

.skeleton-right {
    width: 55%;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.skeleton-line {
    background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
    border-radius: 4px;
}

.skeleton-title-1 { height: 16px; width: 90%; }
.skeleton-title-2 { height: 16px; width: 60%; }
.skeleton-text { height: 12px; width: 80%; margin-top: 4px; }
.skeleton-meta { height: 11px; width: 50%; margin-top: auto; }

@keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* ছোট স্ক্রিনের জন্য অপ্টিমাইজেশন */
@media(max-width: 360px) {
    .title { font-size: 13px; }
    .card, .skeleton-card { min-height: 105px; }
    .play-btn { width: 34px; height: 34px; font-size: 11px; }
    .trending-badge { font-size: 9px; padding: 2px 6px; }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="container" id="cardsContainer">
        <!-- ইনিশিয়াল স্কেলেটন প্লেসহোল্ডার (ডাটা লোড হওয়ার আগ পর্যন্ত দেখাবে) -->
        <div class="skeleton-card">
            <div class="skeleton-left skeleton-line"></div>
            <div class="skeleton-right">
                <div class="skeleton-line skeleton-title-1"></div>
                <div class="skeleton-line skeleton-title-2"></div>
                <div class="skeleton-line skeleton-text"></div>
                <div class="skeleton-line skeleton-meta"></div>
            </div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-left skeleton-line"></div>
            <div class="skeleton-right">
                <div class="skeleton-line skeleton-title-1"></div>
                <div class="skeleton-line skeleton-title-2"></div>
                <div class="skeleton-line skeleton-text"></div>
                <div class="skeleton-line skeleton-meta"></div>
            </div>
        </div>
    </div>
</div>

<div class="ticker">
    <div class="tickerText">🔥 আজকের ভাইরাল ভিডিও • নতুন ট্রেন্ডিং ভিডিও • লাইভ আপডেট • আরও দেখতে ক্লিক করুন • আপনার পছন্দের ভিডিওর উপর ক্লিক করে দেখে নিন এখনই 🥵 </div>
</div>

<script>
const cards=[
{img:'photo1.jpg',title:'গভীর রাতে ধান খেতে নিয়ে ধ*র্ষ*ণ',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 1',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo2.jpg',title:'আপন বোন যখন ধো*ন চুষে দেয়',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 2',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo3.jpg',title:'কিউট গার্লফ্রেন্ডকে ডগি স্টাইলে চু*দে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 3',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo4.jpg',title:'নিজের মাকে দেখে চু*দে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 4',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo5.jpg',title:'হাত জোর করেও রক্ষা পেলনা মেয়েটি',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 5',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo6.jpg',title:'হিজাবি মাকে জোর করে পিছন দিয়ে ঢুকিয়ে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 6',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo7.jpg',title:'অস্থির চো*দা চু*দি ভিডিও, না দেখলে মিস',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 7',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo8.jpg',title:'কি চো*দাটাই না চু*দলো',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 8',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo9.jpg',title:'গার্লফ্রেন্ডকে রুমে ডেকে ডগি স্টাইলে চু*দে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 9',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},

{img:'photo11.jpg',title:'বৌদির কি বড় পাছা, না দেখলে মিস',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন...',site:'Update 11',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'},
{img:'photo12.jpg',title:'মেয়েটাকে বাগানে একা পেয়ে ধ*র্ষ*ণ করে দিল',desc:'সম্পূর্ণ ভিডিও দেখতে ক্লিক করুন... ',site:'Update 12',link:'https://www.effectivecpmnetwork.com/mb12i53qr?key=f005f59825f47393a4348a2a451c649f'}
];

function getTwoRandom(){
let first=Math.floor(Math.random()*cards.length);
let second;
do{
second=Math.floor(Math.random()*cards.length)
}while(second===first);
return [cards[first],cards[second]];
}

// একটি বাস্তবসম্মত লোডিং ইফেক্ট দেখানোর জন্য ৮০০ মিলিমেকেন্ড পর কার্ড রেন্ডার হবে
setTimeout(() => {
    const selected=getTwoRandom();
    const box=document.getElementById('cardsContainer');
    box.innerHTML = ''; // স্কেলেটন রিমুভ করে আসল কন্টেন্ট দেওয়া

    selected.forEach(c=>{
    const randomMinute=Math.floor(Math.random()*119)+2;
    const timeText=randomMinute>=60
    ?`${Math.floor(randomMinute/60)} ঘণ্টা আগে`
    :`${randomMinute} মিনিট আগে`;

    // র্যান্ডম লাইভ ভিউয়ার জেনারেট করা (যেমন: 1.5K, 2.3K)
    const liveWatch = (Math.random() * (2.9 - 1.0) + 1.0).toFixed(1);

    box.innerHTML+=`
    <a class="card" href="${c.link}">
    <div class="left">
        <div class="trending-badge"><i class="fa-solid fa-fire"></i> Trending</div>
        <img src="${c.img}">
        <div class="play-btn"><i class="fa-solid fa-play"></i></div>
    </div>
    <div class="right">
        <div class="title">${c.title}</div>
        <div class="subtitle">${c.desc}</div>
        <div class="meta-info">
            <div class="live-counter"><i class="fa-solid fa-eye"></i> ${liveWatch}K watching now</div>
            <div class="site"><i class="fa-solid fa-circle-radiation" style="font-size:10px;"></i> ${timeText}</div>
        </div>
        <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>
    </div>
    </a>`
    });
}, 800);
</script>

</body>
